name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy agents/ tools/ --ignore-missing-imports || true
      - name: Test
        run: pytest -v
      - name: Security scan
        run: |
          pip install bandit
          bandit -r agents/ tools/ -s B101 || true
      - name: Build gallery
        run: python tools/build_app_gallery.py || true
