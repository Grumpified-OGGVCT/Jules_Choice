name: HLF Autonomous Pipeline

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task:
        description: "Task description for the pipeline"
        required: true
        type: string
      program:
        description: "Override HLF program (optional)"
        required: false
        type: string
      dry_run:
        description: "Dry run mode (compile only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  hlf-pipeline:
    # Only run on issue label events if the label is 'hlf-auto'
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'hlf-auto')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install lark httpx pydantic-settings pyyaml

      - name: Determine task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
            echo "program=${{ github.event.inputs.program }}" >> $GITHUB_OUTPUT
          else
            TITLE="${{ github.event.issue.title }}"
            BODY=$(echo "${{ github.event.issue.body }}" | head -c 500)
            echo "task=${TITLE} ${BODY}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "program=" >> $GITHUB_OUTPUT
          fi

      - name: Run HLF Pipeline
        id: pipeline
        env:
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST || 'http://localhost:11434' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BASE_DIR: ${{ github.workspace }}
        run: |
          ARGS="${{ steps.task.outputs.task }}"
          if [ "${{ steps.task.outputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run ${ARGS}"
          fi
          if [ -n "${{ steps.task.outputs.program }}" ]; then
            ARGS="--program ${{ steps.task.outputs.program }} ${ARGS}"
          fi
          python -m tools.pipeline_runner --json ${ARGS} > pipeline_result.json 2>&1 || true
          echo "result=$(cat pipeline_result.json)" >> $GITHUB_OUTPUT

      - name: Comment on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = {};
            try {
              result = JSON.parse(fs.readFileSync('pipeline_result.json', 'utf8'));
            } catch(e) {
              result = { success: false, errors: ['Pipeline output not parseable'] };
            }

            const status = result.success ? '✅ SUCCESS' : '❌ FAILED';
            const body = [
              `## HLF Pipeline Result: ${status}`,
              '',
              `**Program:** \`${result.program_used || 'unknown'}\``,
              `**Compiled:** ${result.compile_ok ? '✓' : '✗'}`,
              `**Executed:** ${result.execute_ok ? '✓' : '✗'}`,
              result.agent_dispatched ? `**Agent:** ${result.agent_dispatched}` : '',
              result.security_gate !== null ? `**Security Gate:** ${result.security_gate ? 'PASSED' : 'FAILED'}` : '',
              result.health_score !== null ? `**Health Score:** ${result.health_score}/100` : '',
              result.policy_passed !== null ? `**Policy:** ${result.policy_passed ? 'PASSED' : 'FAILED'}` : '',
              `**Time:** ${Math.round(result.execution_time_ms)}ms`,
              '',
              result.errors?.length ? `### Errors\n${result.errors.map(e => `- ${e}`).join('\n')}` : '',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Upload pipeline result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hlf-pipeline-result
          path: pipeline_result.json
