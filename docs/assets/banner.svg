<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f0c29" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)" rx="10"/>
  <!-- Centre glow -->
  <ellipse cx="600" cy="120" rx="380" ry="100" fill="url(#glow)"/>
  <!-- Top / bottom accent lines -->
  <rect x="0" y="0"   width="1200" height="2" fill="#7c3aed" opacity="0.7"/>
  <rect x="0" y="238" width="1200" height="2" fill="#7c3aed" opacity="0.7"/>

  <!-- Star field – top-left -->
  <circle cx="50"  cy="22" r="1.5" fill="#e2e8f0" opacity="0.50"/>
  <circle cx="115" cy="38" r="1.0" fill="#a78bfa" opacity="0.70"/>
  <circle cx="185" cy="18" r="1.5" fill="#e2e8f0" opacity="0.35"/>
  <circle cx="260" cy="45" r="1.0" fill="#818cf8" opacity="0.60"/>
  <circle cx="315" cy="28" r="1.5" fill="#e2e8f0" opacity="0.40"/>
  <!-- Star field – top-right -->
  <circle cx="885"  cy="32" r="1.5" fill="#e2e8f0" opacity="0.40"/>
  <circle cx="940"  cy="18" r="1.0" fill="#a78bfa" opacity="0.65"/>
  <circle cx="1015" cy="42" r="1.5" fill="#e2e8f0" opacity="0.50"/>
  <circle cx="1080" cy="20" r="1.0" fill="#818cf8" opacity="0.70"/>
  <circle cx="1150" cy="38" r="1.5" fill="#e2e8f0" opacity="0.35"/>
  <!-- Star field – bottom-left -->
  <circle cx="62"  cy="208" r="1.0" fill="#c084fc" opacity="0.60"/>
  <circle cx="145" cy="218" r="1.5" fill="#e2e8f0" opacity="0.30"/>
  <circle cx="230" cy="205" r="1.0" fill="#818cf8" opacity="0.50"/>
  <circle cx="305" cy="216" r="1.5" fill="#a78bfa" opacity="0.40"/>
  <!-- Star field – bottom-right -->
  <circle cx="902"  cy="212" r="1.5" fill="#c084fc" opacity="0.50"/>
  <circle cx="975"  cy="200" r="1.0" fill="#e2e8f0" opacity="0.40"/>
  <circle cx="1050" cy="220" r="1.5" fill="#818cf8" opacity="0.55"/>
  <circle cx="1165" cy="206" r="1.0" fill="#a78bfa" opacity="0.45"/>

  <!-- Left orbital element (centre 90, 120) -->
  <circle cx="90" cy="120" r="66" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.20"/>
  <circle cx="90" cy="120" r="46" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.30"/>
  <circle cx="90" cy="120" r="24" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.45"/>
  <circle cx="90" cy="120" r="8"  fill="#c084fc" opacity="0.65"/>
  <circle cx="137" cy="73"  r="3.5" fill="#818cf8" opacity="0.85"/>
  <circle cx="48"  cy="152" r="2.5" fill="#a78bfa" opacity="0.75"/>

  <!-- Right orbital element (centre 1110, 120) -->
  <circle cx="1110" cy="120" r="66" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.20"/>
  <circle cx="1110" cy="120" r="46" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.30"/>
  <circle cx="1110" cy="120" r="24" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.45"/>
  <circle cx="1110" cy="120" r="8"  fill="#c084fc" opacity="0.65"/>
  <circle cx="1063" cy="73"  r="3.5" fill="#818cf8" opacity="0.85"/>
  <circle cx="1152" cy="152" r="2.5" fill="#a78bfa" opacity="0.75"/>

  <!-- Main title -->
  <text x="600" y="106"
        text-anchor="middle"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="60" font-weight="800" letter-spacing="3"
        fill="url(#ttl)">JULES SANDBOX</text>

  <!-- Subtitle -->
  <text x="600" y="150"
        text-anchor="middle"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="18" font-weight="300" letter-spacing="1"
        fill="#94a3b8">An Open-Ended Autonomous AI Playground</text>

  <!-- Badge: Autonomous -->
  <rect x="353" y="168" width="130" height="30" rx="15" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="418" y="188"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="12.5" fill="#a78bfa">&#x2726; Autonomous</text>

  <!-- Badge: Experimental -->
  <rect x="501" y="168" width="142" height="30" rx="15" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="572" y="188"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="12.5" fill="#a78bfa">&#x2697; Experimental</text>

  <!-- Badge: Ever-Evolving -->
  <rect x="661" y="168" width="142" height="30" rx="15" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="732" y="188"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="12.5" fill="#a78bfa">&#x221e; Ever-Evolving</text>
</svg>
