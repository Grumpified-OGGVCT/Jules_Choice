<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="cg2" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrow markers – one per stage colour -->
    <marker id="aw" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
    <marker id="ae" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
    <marker id="ab" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/>
    </marker>
    <marker id="at" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#06b6d4"/>
    </marker>
    <marker id="ac" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b5cf6"/>
    </marker>
    <marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" fill="url(#bg2)" rx="10"/>
  <!-- Centre glow -->
  <ellipse cx="450" cy="215" rx="200" ry="165" fill="url(#cg2)"/>

  <!-- Title -->
  <text x="450" y="34"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="22" font-weight="700" fill="#e2e8f0">How Jules Works</text>
  <text x="450" y="56"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="13" fill="#64748b">The Autonomous Cycle — repeats on every scheduled run</text>

  <!-- Orbit ring (dashed) -->
  <circle cx="450" cy="215" r="150" fill="none" stroke="#334155"
          stroke-width="1.5" stroke-dasharray="5 6"/>

  <!-- ── Connecting arrows (start/end offset by node r=38) ── -->
  <!-- Wake → Explore: (483,84)→(547,121) -->
  <line x1="483" y1="84"  x2="547" y2="121" stroke="#f59e0b" stroke-width="1.8"
        stroke-opacity="0.75" marker-end="url(#aw)"/>
  <!-- Explore → Build: (580,178)→(580,252) -->
  <line x1="580" y1="178" x2="580" y2="252" stroke="#3b82f6" stroke-width="1.8"
        stroke-opacity="0.75" marker-end="url(#ae)"/>
  <!-- Build → Test: (547,309)→(483,346) -->
  <line x1="547" y1="309" x2="483" y2="346" stroke="#22c55e" stroke-width="1.8"
        stroke-opacity="0.75" marker-end="url(#ab)"/>
  <!-- Test → Commit: (417,346)→(353,309) -->
  <line x1="417" y1="346" x2="353" y2="309" stroke="#06b6d4" stroke-width="1.8"
        stroke-opacity="0.75" marker-end="url(#at)"/>
  <!-- Commit → Review: (320,252)→(320,178) -->
  <line x1="320" y1="252" x2="320" y2="178" stroke="#8b5cf6" stroke-width="1.8"
        stroke-opacity="0.75" marker-end="url(#ac)"/>
  <!-- Review → Wake: (353,121)→(417,84) -->
  <line x1="353" y1="121" x2="417" y2="84"  stroke="#ef4444" stroke-width="1.8"
        stroke-opacity="0.75" marker-end="url(#ar)"/>

  <!-- ── Jules centre node ── -->
  <circle cx="450" cy="215" r="52" fill="#0f172a" stroke="#818cf8" stroke-width="2"/>
  <circle cx="450" cy="215" r="44" fill="#1e1b4b"/>
  <text x="450" y="210"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="20" font-weight="800" fill="#818cf8">Jules</text>
  <text x="450" y="228"
        text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="10" fill="#64748b">Autonomous AI</text>

  <!-- ── Wake node (450, 65) ── -->
  <circle cx="450" cy="65" r="38" fill="#1c1917" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="59" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="17" fill="#fbbf24">&#x23F0;</text>
  <text x="450" y="76" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fbbf24">Wake</text>
  <text x="450" y="89" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#78716c">Scheduled trigger</text>

  <!-- ── Explore node (580, 140) ── -->
  <circle cx="580" cy="140" r="38" fill="#0c1a2e" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="134" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="17" fill="#60a5fa">&#x1F50D;</text>
  <text x="580" y="151" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">Explore</text>
  <text x="580" y="164" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#475569">Read &amp; discover</text>

  <!-- ── Build node (580, 290) ── -->
  <circle cx="580" cy="290" r="38" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="580" y="284" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="17" fill="#4ade80">&#x1F527;</text>
  <text x="580" y="301" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Build</text>
  <text x="580" y="314" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#166534">Create &amp; extend</text>

  <!-- ── Test node (450, 365) ── -->
  <circle cx="450" cy="365" r="38" fill="#082f49" stroke="#06b6d4" stroke-width="2"/>
  <text x="450" y="359" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="17" fill="#22d3ee">&#x2713;</text>
  <text x="450" y="376" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#22d3ee">Test</text>
  <text x="450" y="389" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#0e7490">Validate &amp; verify</text>

  <!-- ── Commit node (320, 290) ── -->
  <circle cx="320" cy="290" r="38" fill="#2e1065" stroke="#8b5cf6" stroke-width="2"/>
  <text x="320" y="284" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="17" fill="#a78bfa">&#x1F4BE;</text>
  <text x="320" y="301" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#a78bfa">Commit</text>
  <text x="320" y="314" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#5b21b6">Log &amp; push</text>

  <!-- ── Review node (320, 140) ── -->
  <circle cx="320" cy="140" r="38" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="134" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="17" fill="#f87171">&#x1F441;</text>
  <text x="320" y="151" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#f87171">Review</text>
  <text x="320" y="164" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#991b1b">11-hat audit</text>

  <!-- Legend strip -->
  <rect x="30" y="405" width="840" height="28" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="423" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" fill="#475569">
    Every commit is subject to the Eleven Hats PR review &#x2022; Policy checks run on every change &#x2022; Logs written automatically
  </text>
</svg>
